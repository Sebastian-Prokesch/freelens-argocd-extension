name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type:check

      - name: Lint (Biome + Prettier)
        run: pnpm lint:check

      - name: Unit tests
        run: pnpm test:unit

      - name: Build extension
        run: pnpm build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-out
          path: out/
          if-no-files-found: error

  publish-npm:
    name: publish-npm
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: publishing

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check package version matches tag
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: extension-build-out
          path: out/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) dist_tag=next ;;
            *) dist_tag=latest ;;
          esac
          pnpm publish --no-git-checks --tag "${dist_tag}"
        env:
          NPM_CONFIG_PROVENANCE: "true"

  github-release:
    name: github-release
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: extension-build-out
          path: out/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Pack extension
        run: pnpm pack

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: "*.tgz"
