name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type:check

      - name: Lint (Biome + Prettier)
        run: pnpm lint:check

      - name: Unit tests
        run: pnpm test:unit

      - name: Build extension
        run: pnpm build

      - name: Pack extension
        run: |
          pnpm pack

      - name: Upload packaged tarball
        uses: actions/upload-artifact@v4
        with:
          name: extension-tarball
          path: "*.tgz"
          if-no-files-found: error

  attach-release-asset:
    runs-on: ubuntu-latest
    needs: verify-and-pack
    if: ${{ github.event_name == 'release' }}

    steps:
      - name: Download packaged tarball
        uses: actions/download-artifact@v4
        with:
          name: extension-tarball
          path: .

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.tgz"
