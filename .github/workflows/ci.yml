name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type:check

      - name: Lint (Biome)
        id: biome_check
        run: pnpm biome:check

      - name: Explain Biome failure
        if: ${{ failure() && steps.biome_check.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            core.error("Biome check failed: formatting or import-order issues were found. Run 'pnpm biome:fix' locally, verify with 'pnpm biome:check', then commit.");
            await core.summary
              .addHeading("Biome check failed")
              .addRaw("Actionable fix:\n")
              .addList([
                "Run `pnpm biome:fix` locally",
                "Verify with `pnpm biome:check`",
                "Commit formatting/import-order changes",
              ])
              .write();

      - name: Unit tests
        run: pnpm test:unit

  build:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-out
          path: out/
          if-no-files-found: error

  pack:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: extension-build-out
          path: out/

      - name: Pack extension
        run: pnpm pack

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-artifacts
          path: |
            out/
            *.tgz
          if-no-files-found: error
