name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type:check

      - name: Lint
        run: pnpm lint:check

      - name: Unit tests
        run: pnpm test:unit

      - name: Build extension
        run: pnpm build

      - name: Pack extension
        run: pnpm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-out
          path: |
            out/
            *.tgz
          if-no-files-found: error
